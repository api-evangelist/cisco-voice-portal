description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: cisco-voice-portal-free
    name: Free
    type: freemium
    description: Free entry tier for the Cisco Voice Portal API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://cvp-callserver.example.com:8000/cvp/rest
          - https://cvp-reporting.example.com:8111/cvp-reporting/rest
          - https://cvp-oamp.example.com:9443/oamp/rest
          - https://cvp-vxmlserver.example.com:7443/CVP/rest
          - tcp://cvp-callserver.example.com:61616
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://cvp-callserver.example.com:8000/cvp/rest
          - https://cvp-reporting.example.com:8111/cvp-reporting/rest
          - https://cvp-oamp.example.com:9443/oamp/rest
