provider: Cisco Voice Portal
providerId: cisco-voice-portal
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Contact Center
  - IVR
  - Voice
  - Unified Communications
description: Cisco Unified Customer Voice Portal (CVP) is on-premises IVR / voice-self-service software
  for Cisco Contact Center Enterprise. It is licensed by IVR / queue / call-control port via Cisco
  Smart Licensing as part of the Cisco Contact Center Enterprise (UCCE / PCCE) bill of materials.
  The CVP REST/SOAP management APIs are not separately metered or sold per call; pricing flows through
  Cisco partner quotes.
notes: No public per-API price list. Replace with negotiated list pricing once available from a Cisco
  partner quote.
sources:
  - https://www.cisco.com/c/en/us/products/customer-collaboration/unified-customer-voice-portal/index.html
  - https://www.cisco.com/c/en/us/products/contact-center/index.html
plans:
  - id: cisco-voice-portal-included-with-uccx-ucce
    name: Included with Cisco Contact Center Enterprise / Express
    type: enterprise
    description: CVP and its management APIs ship as part of Cisco Contact Center Enterprise (UCCE /
      PCCE) or Express (UCCX) deployments. Capacity is licensed by IVR / queue port count.
    entries:
      - label: Bundled CCE / CVP licensing
        name: bundled_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see Cisco partner quote
        userMultiplied: false
    elements:
      - name: CVP Operations Console (OAMP) APIs
      - name: CVP VXML server runtime
      - name: CVP Reporting Server
      - name: Smart Licensing entitlements
