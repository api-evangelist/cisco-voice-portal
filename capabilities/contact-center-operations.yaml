naftiko: "1.0.0-alpha1"

info:
  label: "Cisco Voice Portal Contact Center Operations"
  description: "Unified workflow for contact center operations combining call control, reporting, administration, and VXML services. Used by contact center administrators and operations teams for monitoring, managing, and optimizing voice self-service applications."
  tags:
    - Cisco
    - Contact Center
    - Voice Portal
    - IVR
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      CVP_USERNAME: CVP_USERNAME
      CVP_PASSWORD: CVP_PASSWORD
      CVP_ADMIN_USERNAME: CVP_ADMIN_USERNAME
      CVP_ADMIN_PASSWORD: CVP_ADMIN_PASSWORD

capability:
  consumes:
    - import: call-control
      location: ./shared/call-control.yaml
    - import: reporting
      location: ./shared/reporting.yaml
    - import: administration
      location: ./shared/administration.yaml
    - import: vxml-services
      location: ./shared/vxml-services.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: contact-center-api
      description: "Unified REST API for Cisco Voice Portal contact center operations."
      resources:
        - path: /v1/calls
          name: calls
          description: "Active call management"
          operations:
            - method: GET
              name: list-active-calls
              description: "List active calls"
              call: "call-control.list-active-calls"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/calls/{callGuid}
          name: call
          description: "Individual call details"
          operations:
            - method: GET
              name: get-call
              description: "Get call details"
              call: "call-control.get-call"
              with:
                callGuid: "rest.callGuid"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cdrs
          name: cdrs
          description: "Call detail records"
          operations:
            - method: GET
              name: list-cdrs
              description: "List call detail records"
              call: "reporting.list-cdrs"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/statistics
          name: statistics
          description: "Real-time statistics"
          operations:
            - method: GET
              name: get-statistics
              description: "Get real-time call statistics"
              call: "reporting.get-statistics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/devices
          name: devices
          description: "Device management"
          operations:
            - method: GET
              name: list-devices
              description: "List managed devices"
              call: "administration.list-devices"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications
          name: applications
          description: "Application management"
          operations:
            - method: GET
              name: list-applications
              description: "List deployed applications"
              call: "administration.list-applications"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sessions
          name: sessions
          description: "VXML session monitoring"
          operations:
            - method: GET
              name: list-sessions
              description: "List active VXML sessions"
              call: "vxml-services.list-active-sessions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/health
          name: health
          description: "System health"
          operations:
            - method: GET
              name: get-health
              description: "Get call server health"
              call: "call-control.get-health"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: contact-center-mcp
      transport: http
      description: "MCP server for AI-assisted Cisco Voice Portal contact center operations."
      tools:
        - name: list-active-calls
          description: "List all active calls on the CVP Call Server"
          hints:
            readOnly: true
            idempotent: true
          call: "call-control.list-active-calls"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-call
          description: "Get details of a specific active call"
          hints:
            readOnly: true
            idempotent: true
          call: "call-control.get-call"
          with:
            callGuid: "tools.callGuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-call-server-health
          description: "Check CVP Call Server health status"
          hints:
            readOnly: true
            idempotent: true
          call: "call-control.get-health"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-cdrs
          description: "List call detail records from the Reporting Server"
          hints:
            readOnly: true
            idempotent: true
          call: "reporting.list-cdrs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-statistics
          description: "Get real-time call statistics"
          hints:
            readOnly: true
            idempotent: true
          call: "reporting.get-statistics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-devices
          description: "List managed CVP devices"
          hints:
            readOnly: true
            idempotent: true
          call: "administration.list-devices"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-applications
          description: "List deployed CVP applications"
          hints:
            readOnly: true
            idempotent: true
          call: "administration.list-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-dialed-number-patterns
          description: "List configured dialed number patterns"
          hints:
            readOnly: true
            idempotent: true
          call: "administration.list-dialed-number-patterns"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-vxml-applications
          description: "List deployed VXML applications"
          hints:
            readOnly: true
            idempotent: true
          call: "vxml-services.list-vxml-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-active-sessions
          description: "List active VXML sessions"
          hints:
            readOnly: true
            idempotent: true
          call: "vxml-services.list-active-sessions"
          outputParameters:
            - type: object
              mapping: "$."
