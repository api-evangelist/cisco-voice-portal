naftiko: 1.0.0-alpha2
info:
  label: Cisco Voice Portal Contact Center Operations
  description: Unified workflow for contact center operations combining call control, reporting, administration, and VXML
    services. Used by contact center administrators and operations teams for monitoring, managing, and optimizing voice self-service
    applications.
  tags:
  - Cisco
  - Contact Center
  - Voice Portal
  - IVR
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    CVP_USERNAME: CVP_USERNAME
    CVP_PASSWORD: CVP_PASSWORD
    CVP_ADMIN_USERNAME: CVP_ADMIN_USERNAME
    CVP_ADMIN_PASSWORD: CVP_ADMIN_PASSWORD
capability:
  consumes:
  - type: http
    namespace: call-control
    baseUri: https://cvp-callserver.example.com:8000/cvp/rest
    description: CVP Call Server REST API
    authentication:
      type: basic
      username: '{{CVP_USERNAME}}'
      password: '{{CVP_PASSWORD}}'
    resources:
    - name: calls
      path: /call
      description: Active call management
      operations:
      - name: list-active-calls
        method: GET
        description: List all active calls
        inputParameters:
        - name: state
          in: query
          type: string
          required: false
          description: Filter by call state
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: call
      path: /call/{callGuid}
      description: Individual call operations
      operations:
      - name: get-call
        method: GET
        description: Get call details
        inputParameters:
        - name: callGuid
          in: path
          type: string
          required: true
          description: Call GUID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: health
      path: /health
      description: Call server health
      operations:
      - name: get-health
        method: GET
        description: Get call server health status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: reporting
    baseUri: https://cvp-reporting.example.com:8111/cvp-reporting/rest
    description: CVP Reporting Server REST API
    authentication:
      type: basic
      username: '{{CVP_USERNAME}}'
      password: '{{CVP_PASSWORD}}'
    resources:
    - name: cdrs
      path: /cdr
      description: Call detail records
      operations:
      - name: list-cdrs
        method: GET
        description: List call detail records
        inputParameters:
        - name: startTime
          in: query
          type: string
          required: false
          description: Start time filter
        - name: endTime
          in: query
          type: string
          required: false
          description: End time filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: statistics
      path: /statistics
      description: Real-time call statistics
      operations:
      - name: get-statistics
        method: GET
        description: Get real-time call statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: administration
    baseUri: https://cvp-oamp.example.com:9443/oamp/rest
    description: CVP OAMP REST API
    authentication:
      type: basic
      username: '{{CVP_ADMIN_USERNAME}}'
      password: '{{CVP_ADMIN_PASSWORD}}'
    resources:
    - name: devices
      path: /device
      description: Device management
      operations:
      - name: list-devices
        method: GET
        description: List managed devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications
      path: /application
      description: Application management
      operations:
      - name: list-applications
        method: GET
        description: List deployed applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dialed-number-patterns
      path: /dialedNumberPattern
      description: Dialed number pattern management
      operations:
      - name: list-dialed-number-patterns
        method: GET
        description: List dialed number patterns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: vxml-services
    baseUri: https://cvp-vxmlserver.example.com:7443/CVP/rest
    description: CVP VXML Server REST API
    authentication:
      type: basic
      username: '{{CVP_USERNAME}}'
      password: '{{CVP_PASSWORD}}'
    resources:
    - name: applications
      path: /application
      description: VXML application management
      operations:
      - name: list-vxml-applications
        method: GET
        description: List VXML applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sessions
      path: /session
      description: Active session monitoring
      operations:
      - name: list-active-sessions
        method: GET
        description: List active VXML sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: contact-center-api
    description: Unified REST API for Cisco Voice Portal contact center operations.
    resources:
    - path: /v1/calls
      name: calls
      description: Active call management
      operations:
      - method: GET
        name: list-active-calls
        description: List active calls
        call: call-control.list-active-calls
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/{callGuid}
      name: call
      description: Individual call details
      operations:
      - method: GET
        name: get-call
        description: Get call details
        call: call-control.get-call
        with:
          callGuid: rest.callGuid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cdrs
      name: cdrs
      description: Call detail records
      operations:
      - method: GET
        name: list-cdrs
        description: List call detail records
        call: reporting.list-cdrs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/statistics
      name: statistics
      description: Real-time statistics
      operations:
      - method: GET
        name: get-statistics
        description: Get real-time call statistics
        call: reporting.get-statistics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/devices
      name: devices
      description: Device management
      operations:
      - method: GET
        name: list-devices
        description: List managed devices
        call: administration.list-devices
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications
      name: applications
      description: Application management
      operations:
      - method: GET
        name: list-applications
        description: List deployed applications
        call: administration.list-applications
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sessions
      name: sessions
      description: VXML session monitoring
      operations:
      - method: GET
        name: list-sessions
        description: List active VXML sessions
        call: vxml-services.list-active-sessions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/health
      name: health
      description: System health
      operations:
      - method: GET
        name: get-health
        description: Get call server health
        call: call-control.get-health
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: contact-center-mcp
    transport: http
    description: MCP server for AI-assisted Cisco Voice Portal contact center operations.
    tools:
    - name: list-active-calls
      description: List all active calls on the CVP Call Server
      hints:
        readOnly: true
        idempotent: true
      call: call-control.list-active-calls
      outputParameters:
      - type: object
        mapping: $.
    - name: get-call
      description: Get details of a specific active call
      hints:
        readOnly: true
        idempotent: true
      call: call-control.get-call
      with:
        callGuid: tools.callGuid
      outputParameters:
      - type: object
        mapping: $.
    - name: get-call-server-health
      description: Check CVP Call Server health status
      hints:
        readOnly: true
        idempotent: true
      call: call-control.get-health
      outputParameters:
      - type: object
        mapping: $.
    - name: list-cdrs
      description: List call detail records from the Reporting Server
      hints:
        readOnly: true
        idempotent: true
      call: reporting.list-cdrs
      outputParameters:
      - type: object
        mapping: $.
    - name: get-statistics
      description: Get real-time call statistics
      hints:
        readOnly: true
        idempotent: true
      call: reporting.get-statistics
      outputParameters:
      - type: object
        mapping: $.
    - name: list-devices
      description: List managed CVP devices
      hints:
        readOnly: true
        idempotent: true
      call: administration.list-devices
      outputParameters:
      - type: object
        mapping: $.
    - name: list-applications
      description: List deployed CVP applications
      hints:
        readOnly: true
        idempotent: true
      call: administration.list-applications
      outputParameters:
      - type: object
        mapping: $.
    - name: list-dialed-number-patterns
      description: List configured dialed number patterns
      hints:
        readOnly: true
        idempotent: true
      call: administration.list-dialed-number-patterns
      outputParameters:
      - type: object
        mapping: $.
    - name: list-vxml-applications
      description: List deployed VXML applications
      hints:
        readOnly: true
        idempotent: true
      call: vxml-services.list-vxml-applications
      outputParameters:
      - type: object
        mapping: $.
    - name: list-active-sessions
      description: List active VXML sessions
      hints:
        readOnly: true
        idempotent: true
      call: vxml-services.list-active-sessions
      outputParameters:
      - type: object
        mapping: $.
