naftiko: 1.0.0-alpha2
info:
  label: Cisco Voice Portal Administration API — SIP Configuration
  description: 'Cisco Voice Portal Administration API — SIP Configuration. 2 operations. Lead operation: Cisco Voice Portal
    List Sip Server Groups. Self-contained Naftiko capability covering one Cisco Voice Portal business surface.'
  tags:
  - Cisco Voice Portal
  - SIP Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_VOICE_PORTAL_API_KEY: CISCO_VOICE_PORTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: administration-sip-configuration
    baseUri: https://{oamp-server}:9443/oamp/rest
    description: Cisco Voice Portal Administration API — SIP Configuration business capability. Self-contained, no shared
      references.
    resources:
    - name: sipserver
      path: /sipserver
      operations:
      - name: listsipservers
        method: GET
        description: Cisco Voice Portal List Sip Server Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsipservergroup
        method: POST
        description: Cisco Voice Portal Create a Sip Server Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: JSESSIONID
      value: '{{env.CISCO_VOICE_PORTAL_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: administration-sip-configuration-rest
    port: 8080
    description: REST adapter for Cisco Voice Portal Administration API — SIP Configuration. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/sipserver
      name: sipserver
      description: REST surface for sipserver.
      operations:
      - method: GET
        name: listsipservers
        description: Cisco Voice Portal List Sip Server Groups
        call: administration-sip-configuration.listsipservers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsipservergroup
        description: Cisco Voice Portal Create a Sip Server Group
        call: administration-sip-configuration.createsipservergroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: administration-sip-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Voice Portal Administration API — SIP Configuration. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: cisco-voice-portal-list-sip
      description: Cisco Voice Portal List Sip Server Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: administration-sip-configuration.listsipservers
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-create-sip
      description: Cisco Voice Portal Create a Sip Server Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: administration-sip-configuration.createsipservergroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
