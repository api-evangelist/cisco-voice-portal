naftiko: 1.0.0-alpha2
info:
  label: Cisco Voice Portal Reporting API — Real-Time Statistics
  description: 'Cisco Voice Portal Reporting API — Real-Time Statistics. 1 operations. Lead operation: Cisco Voice Portal
    Get Real-time Call Statistics. Self-contained Naftiko capability covering one Cisco Voice Portal business surface.'
  tags:
  - Cisco Voice Portal
  - Real-Time Statistics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_VOICE_PORTAL_API_KEY: CISCO_VOICE_PORTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: reporting-real-time-statistics
    baseUri: https://{reporting-server}:8111/cvp-reporting/rest
    description: Cisco Voice Portal Reporting API — Real-Time Statistics business capability. Self-contained, no shared references.
    resources:
    - name: statistics-realtime
      path: /statistics/realtime
      operations:
      - name: getrealtimestatistics
        method: GET
        description: Cisco Voice Portal Get Real-time Call Statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: serverId
          in: query
          type: string
          description: Filter by specific server ID. If omitted, returns aggregate.
    authentication:
      type: basic
      username: '{{env.CISCO_VOICE_PORTAL_USER}}'
      password: '{{env.CISCO_VOICE_PORTAL_PASS}}'
  exposes:
  - type: rest
    namespace: reporting-real-time-statistics-rest
    port: 8080
    description: REST adapter for Cisco Voice Portal Reporting API — Real-Time Statistics. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/statistics/realtime
      name: statistics-realtime
      description: REST surface for statistics-realtime.
      operations:
      - method: GET
        name: getrealtimestatistics
        description: Cisco Voice Portal Get Real-time Call Statistics
        call: reporting-real-time-statistics.getrealtimestatistics
        with:
          serverId: rest.serverId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reporting-real-time-statistics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Voice Portal Reporting API — Real-Time Statistics. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: cisco-voice-portal-get-real
      description: Cisco Voice Portal Get Real-time Call Statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reporting-real-time-statistics.getrealtimestatistics
      with:
        serverId: tools.serverId
      outputParameters:
      - type: object
        mapping: $.
