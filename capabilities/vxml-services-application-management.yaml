naftiko: 1.0.0-alpha2
info:
  label: Cisco Voice Portal VXML Services API — Application Management
  description: 'Cisco Voice Portal VXML Services API — Application Management. 4 operations. Lead operation: Cisco Voice Portal
    List Deployed Vxml Applications. Self-contained Naftiko capability covering one Cisco Voice Portal business surface.'
  tags:
  - Cisco Voice Portal
  - Application Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_VOICE_PORTAL_API_KEY: CISCO_VOICE_PORTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: vxml-services-application-management
    baseUri: https://{vxml-server}:7443/CVP/rest
    description: Cisco Voice Portal VXML Services API — Application Management business capability. Self-contained, no shared
      references.
    resources:
    - name: application
      path: /application
      operations:
      - name: listdeployedapplications
        method: GET
        description: Cisco Voice Portal List Deployed Vxml Applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by application status
    - name: application-applicationName
      path: /application/{applicationName}
      operations:
      - name: getapplicationdetails
        method: GET
        description: Cisco Voice Portal Get Vxml Application Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: application-applicationName-activate
      path: /application/{applicationName}/activate
      operations:
      - name: activateapplication
        method: POST
        description: Cisco Voice Portal Activate a Vxml Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: application-applicationName-deactivate
      path: /application/{applicationName}/deactivate
      operations:
      - name: deactivateapplication
        method: POST
        description: Cisco Voice Portal Deactivate a Vxml Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_VOICE_PORTAL_USER}}'
      password: '{{env.CISCO_VOICE_PORTAL_PASS}}'
  exposes:
  - type: rest
    namespace: vxml-services-application-management-rest
    port: 8080
    description: REST adapter for Cisco Voice Portal VXML Services API — Application Management. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/application
      name: application
      description: REST surface for application.
      operations:
      - method: GET
        name: listdeployedapplications
        description: Cisco Voice Portal List Deployed Vxml Applications
        call: vxml-services-application-management.listdeployedapplications
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationname}
      name: application-applicationname
      description: REST surface for application-applicationName.
      operations:
      - method: GET
        name: getapplicationdetails
        description: Cisco Voice Portal Get Vxml Application Details
        call: vxml-services-application-management.getapplicationdetails
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationname}/activate
      name: application-applicationname-activate
      description: REST surface for application-applicationName-activate.
      operations:
      - method: POST
        name: activateapplication
        description: Cisco Voice Portal Activate a Vxml Application
        call: vxml-services-application-management.activateapplication
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationname}/deactivate
      name: application-applicationname-deactivate
      description: REST surface for application-applicationName-deactivate.
      operations:
      - method: POST
        name: deactivateapplication
        description: Cisco Voice Portal Deactivate a Vxml Application
        call: vxml-services-application-management.deactivateapplication
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vxml-services-application-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Voice Portal VXML Services API — Application Management. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: cisco-voice-portal-list-deployed
      description: Cisco Voice Portal List Deployed Vxml Applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vxml-services-application-management.listdeployedapplications
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-get-vxml
      description: Cisco Voice Portal Get Vxml Application Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vxml-services-application-management.getapplicationdetails
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-activate-vxml
      description: Cisco Voice Portal Activate a Vxml Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vxml-services-application-management.activateapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-deactivate-vxml
      description: Cisco Voice Portal Deactivate a Vxml Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vxml-services-application-management.deactivateapplication
      outputParameters:
      - type: object
        mapping: $.
