naftiko: "1.0.0-alpha1"

info:
  label: "Cisco Voice Portal VXML Services API"
  description: "Management and monitoring of the CVP VXML Server including application deployment, session monitoring, and micro-application management."
  tags:
    - Cisco
    - Voice Portal
    - VXML
    - IVR
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      CVP_USERNAME: CVP_USERNAME
      CVP_PASSWORD: CVP_PASSWORD

capability:
  consumes:
    - type: http
      namespace: vxml-services
      baseUri: https://cvp-vxmlserver.example.com:7443/CVP/rest
      description: "CVP VXML Server REST API"
      authentication:
        type: basic
        username: "{{CVP_USERNAME}}"
        password: "{{CVP_PASSWORD}}"
      resources:
        - name: applications
          path: /application
          description: "VXML application management"
          operations:
            - name: list-vxml-applications
              method: GET
              description: "List VXML applications"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sessions
          path: /session
          description: "Active session monitoring"
          operations:
            - name: list-active-sessions
              method: GET
              description: "List active VXML sessions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9103
      namespace: vxml-services-mcp
      transport: http
      tools:
        - name: list-vxml-applications
          description: "List deployed VXML applications"
          hints:
            readOnly: true
            idempotent: true
          call: "vxml-services.list-vxml-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-active-sessions
          description: "List active VXML sessions"
          hints:
            readOnly: true
            idempotent: true
          call: "vxml-services.list-active-sessions"
          outputParameters:
            - type: object
              mapping: "$."
