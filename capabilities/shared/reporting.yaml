naftiko: "1.0.0-alpha1"

info:
  label: "Cisco Voice Portal Reporting API"
  description: "Access call detail records, real-time statistics, and historical reporting data from the CVP Reporting Server."
  tags:
    - Cisco
    - Voice Portal
    - Reporting
    - Analytics
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      CVP_USERNAME: CVP_USERNAME
      CVP_PASSWORD: CVP_PASSWORD

capability:
  consumes:
    - type: http
      namespace: reporting
      baseUri: https://cvp-reporting.example.com:8111/cvp-reporting/rest
      description: "CVP Reporting Server REST API"
      authentication:
        type: basic
        username: "{{CVP_USERNAME}}"
        password: "{{CVP_PASSWORD}}"
      resources:
        - name: cdrs
          path: /cdr
          description: "Call detail records"
          operations:
            - name: list-cdrs
              method: GET
              description: "List call detail records"
              inputParameters:
                - name: startTime
                  in: query
                  type: string
                  required: false
                  description: "Start time filter"
                - name: endTime
                  in: query
                  type: string
                  required: false
                  description: "End time filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: statistics
          path: /statistics
          description: "Real-time call statistics"
          operations:
            - name: get-statistics
              method: GET
              description: "Get real-time call statistics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9101
      namespace: reporting-mcp
      transport: http
      tools:
        - name: list-cdrs
          description: "List call detail records"
          hints:
            readOnly: true
            idempotent: true
          call: "reporting.list-cdrs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-statistics
          description: "Get real-time call statistics"
          hints:
            readOnly: true
            idempotent: true
          call: "reporting.get-statistics"
          outputParameters:
            - type: object
              mapping: "$."
