naftiko: "1.0.0-alpha1"

info:
  label: "Cisco Voice Portal Call Control API"
  description: "Call control functions on the CVP Call Server including active call management, call routing, and SIP session monitoring."
  tags:
    - Cisco
    - Voice Portal
    - Call Control
    - SIP
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      CVP_USERNAME: CVP_USERNAME
      CVP_PASSWORD: CVP_PASSWORD

capability:
  consumes:
    - type: http
      namespace: call-control
      baseUri: https://cvp-callserver.example.com:8000/cvp/rest
      description: "CVP Call Server REST API"
      authentication:
        type: basic
        username: "{{CVP_USERNAME}}"
        password: "{{CVP_PASSWORD}}"
      resources:
        - name: calls
          path: /call
          description: "Active call management"
          operations:
            - name: list-active-calls
              method: GET
              description: "List all active calls"
              inputParameters:
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "Filter by call state"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: call
          path: /call/{callGuid}
          description: "Individual call operations"
          operations:
            - name: get-call
              method: GET
              description: "Get call details"
              inputParameters:
                - name: callGuid
                  in: path
                  type: string
                  required: true
                  description: "Call GUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: health
          path: /health
          description: "Call server health"
          operations:
            - name: get-health
              method: GET
              description: "Get call server health status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9100
      namespace: call-control-mcp
      transport: http
      tools:
        - name: list-active-calls
          description: "List active calls on the call server"
          hints:
            readOnly: true
            idempotent: true
          call: "call-control.list-active-calls"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-call
          description: "Get details of a specific call"
          hints:
            readOnly: true
            idempotent: true
          call: "call-control.get-call"
          with:
            callGuid: "tools.callGuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-call-server-health
          description: "Get call server health status"
          hints:
            readOnly: true
            idempotent: true
          call: "call-control.get-health"
          outputParameters:
            - type: object
              mapping: "$."
