naftiko: 1.0.0-alpha2
info:
  label: Cisco Voice Portal Administration API — User Management
  description: 'Cisco Voice Portal Administration API — User Management. 2 operations. Lead operation: Cisco Voice Portal
    List Oamp Users. Self-contained Naftiko capability covering one Cisco Voice Portal business surface.'
  tags:
  - Cisco Voice Portal
  - User Management
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_VOICE_PORTAL_API_KEY: CISCO_VOICE_PORTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: administration-user-management
    baseUri: https://{oamp-server}:9443/oamp/rest
    description: Cisco Voice Portal Administration API — User Management business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: listusers
        method: GET
        description: Cisco Voice Portal List Oamp Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createuser
        method: POST
        description: Cisco Voice Portal Create an Oamp User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: JSESSIONID
      value: '{{env.CISCO_VOICE_PORTAL_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: administration-user-management-rest
    port: 8080
    description: REST adapter for Cisco Voice Portal Administration API — User Management. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: listusers
        description: Cisco Voice Portal List Oamp Users
        call: administration-user-management.listusers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Cisco Voice Portal Create an Oamp User
        call: administration-user-management.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: administration-user-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Voice Portal Administration API — User Management. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: cisco-voice-portal-list-oamp
      description: Cisco Voice Portal List Oamp Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: administration-user-management.listusers
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-create-oamp
      description: Cisco Voice Portal Create an Oamp User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: administration-user-management.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
