naftiko: 1.0.0-alpha2
info:
  label: Cisco Voice Portal VXML Services API — Application Configuration
  description: 'Cisco Voice Portal VXML Services API — Application Configuration. 3 operations. Lead operation: Cisco Voice
    Portal Get Application Configuration. Self-contained Naftiko capability covering one Cisco Voice Portal business surface.'
  tags:
  - Cisco Voice Portal
  - Application Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_VOICE_PORTAL_API_KEY: CISCO_VOICE_PORTAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: vxml-services-application-configuration
    baseUri: https://{vxml-server}:7443/CVP/rest
    description: Cisco Voice Portal VXML Services API — Application Configuration business capability. Self-contained, no
      shared references.
    resources:
    - name: application-applicationName-config
      path: /application/{applicationName}/config
      operations:
      - name: getapplicationconfig
        method: GET
        description: Cisco Voice Portal Get Application Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapplicationconfig
        method: PUT
        description: Cisco Voice Portal Update Application Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: application-applicationName-elements
      path: /application/{applicationName}/elements
      operations:
      - name: listapplicationelements
        method: GET
        description: Cisco Voice Portal List Application Call Flow Elements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_VOICE_PORTAL_USER}}'
      password: '{{env.CISCO_VOICE_PORTAL_PASS}}'
  exposes:
  - type: rest
    namespace: vxml-services-application-configuration-rest
    port: 8080
    description: REST adapter for Cisco Voice Portal VXML Services API — Application Configuration. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/application/{applicationname}/config
      name: application-applicationname-config
      description: REST surface for application-applicationName-config.
      operations:
      - method: GET
        name: getapplicationconfig
        description: Cisco Voice Portal Get Application Configuration
        call: vxml-services-application-configuration.getapplicationconfig
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapplicationconfig
        description: Cisco Voice Portal Update Application Configuration
        call: vxml-services-application-configuration.updateapplicationconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/application/{applicationname}/elements
      name: application-applicationname-elements
      description: REST surface for application-applicationName-elements.
      operations:
      - method: GET
        name: listapplicationelements
        description: Cisco Voice Portal List Application Call Flow Elements
        call: vxml-services-application-configuration.listapplicationelements
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vxml-services-application-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Voice Portal VXML Services API — Application Configuration. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: cisco-voice-portal-get-application
      description: Cisco Voice Portal Get Application Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vxml-services-application-configuration.getapplicationconfig
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-update-application
      description: Cisco Voice Portal Update Application Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: vxml-services-application-configuration.updateapplicationconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-voice-portal-list-application
      description: Cisco Voice Portal List Application Call Flow Elements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vxml-services-application-configuration.listapplicationelements
      outputParameters:
      - type: object
        mapping: $.
