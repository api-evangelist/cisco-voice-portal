specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Cisco Voice Portal
providerId: cisco-voice-portal
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Contact Center
  - IVR
  - Voice
  - Rate Limiting
description: Cisco Unified Customer Voice Portal is a customer-deployed product. Public per-second
  rate limits for the CVP Operations Console (OAMP) and VXML server APIs are not published; throughput
  is bounded by the CVP server sizing and the licensed IVR / call-control port count documented in
  the CVP Solution Reference Network Design (SRND).
notes: Replace with concrete OAMP / VXML throughput numbers once verified against the CVP SRND for the
  customer's deployed version.
sources:
  - https://www.cisco.com/c/en/us/support/customer-collaboration/unified-customer-voice-portal/products-installation-and-configuration-guides-list.html
  - https://www.cisco.com/c/en/us/td/docs/voice_ip_comm/cust_contact/contact_center/customer_voice_portal/srnd.html
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: CVP Operations Console (OAMP) API
    scope: server
    metric: varies
    limit: see CVP Operations Guide; bounded by OAMP server CPU
  - name: VXML / call-control ports
    scope: deployment
    metric: concurrent_calls
    limit: see CVP SRND for licensed IVR and call-control port maxima
policies:
  - name: Capacity-bounded
    description: Limits are bounded by CVP server VM sizing and Smart Licensing port entitlements,
      not by a cloud-style per-second quota.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on HTTP 429/503 responses
      from the OAMP API.
  - name: Reporting offload
    description: Use the CVP Reporting Server / data warehouse for historical analytics rather than
      polling OAMP for live data.
maintainers:
