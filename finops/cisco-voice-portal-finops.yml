specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Cisco Voice Portal
providerId: cisco-voice-portal
publisherName: Cisco Systems, Inc.
serviceCategory: Contact Center
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Contact Center
  - IVR
  - Voice
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Cisco Unified Customer Voice Portal. Cost is driven by
  Smart Licensing entitlements for IVR / call-control ports under the Cisco Contact Center Enterprise
  bill of materials, not by per-API metering.
notes: Per-API meters below are placeholders modeled on operational dimensions; real billing flows
  through Cisco Contact Center licensing line items and underlying server / TDM gateway costs.
sources:
  - https://www.cisco.com/c/en/us/products/customer-collaboration/unified-customer-voice-portal/index.html
billingModel:
  pricingCategory: Subscription + Perpetual License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Cisco Voice Portal
  ServiceCategory: Contact Center
  ProviderName: Cisco
  PublisherName: Cisco Systems, Inc.
  InvoiceIssuerName: Cisco Systems, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: ivr_ports
    description: Licensed IVR ports for VXML self-service.
    unit: port
    aggregation: max
    dimensions:
      - region
      - environment
  - name: call_control_ports
    description: Licensed call-control / queueing ports.
    unit: port
    aggregation: max
    dimensions:
      - region
      - environment
  - name: cvp_server_compute
    description: VM compute for CVP Call Server, VXML Server, OAMP, and Reporting Server.
    unit: instance-hour
    aggregation: sum
    dimensions:
      - role
      - region
principles:
  - name: Visibility
    description: Use the CVP Reporting Server, Cisco Smart Software Manager, and Contact Center
      management portal to observe port utilization and license consumption.
  - name: Allocation
    description: Allocate IVR / port costs to the contact center business unit; chargeback by line
      of business using call-type / dialed-number reporting.
  - name: Optimization
    description: Right-size IVR port counts to peak concurrent call volume, retire low-traffic IVR
      applications, and consolidate VXML applications onto shared CVP servers.
  - name: Accountability
    description: Contact Center operations owner is accountable for CVP port forecasting, license
      renewals, and IVR application lifecycle.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
